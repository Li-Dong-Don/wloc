#!name=WLOC 定位修改 (Apple/腾讯地图)
#!desc=修改 Apple 网络定位和腾讯地图逆地理编码坐标 | 快捷指令(推荐): 设置地理位置 https://www.icloud.com/shortcuts/a82717d8fdad4e6280866fcf911173f7 清理恢复位置 https://www.icloud.com/shortcuts/f42632d406504f24a2cd163af4fe012f | 选点页面: https://wloc-pages.pages.dev/
